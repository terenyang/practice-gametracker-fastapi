<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameTracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 24px; font-weight: 700; text-align: center; color: #1e293b; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #475569; }
        input { width: 100%; padding: 10px 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: border 0.2s; }
        input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        button { width: 100%; background-color: #4f46e5; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #4338ca; }
        p { text-align: center; font-size: 14px; color: #64748b; margin-top: 24px; }
        a { color: #4f46e5; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome Back</h2>
        <form action="/login" method="post">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
            
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
            
            <button type="submit">Log In</button>
        </form>
        <p>Don't have an account? <a href="/register">Sign up here</a></p>
    </div>
</body>
</html>
