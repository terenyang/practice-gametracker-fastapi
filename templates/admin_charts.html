<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Advanced Metrics - GameTracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; margin: 0; padding: 40px; color: #f8fafc; }
        .container { max-width: 1200px; margin: 0 auto; }
        .back-link { text-decoration: none; color: #818cf8; font-weight: 500; display: inline-block; margin-bottom: 24px; }
        .back-link:hover { text-decoration: underline; }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 32px; margin-top: 12px; }
        @media(min-width: 900px) { 
            .grid-split { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; } 
        }
        
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 28px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 32px; }
        h2 { margin-top: 0; font-size: 20px; color: white; letter-spacing: -0.025em; }
        p { color: #94a3b8; font-size: 14px; margin-top: -4px; margin-bottom: 24px; }
        .chart-wrapper { position: relative; width: 100%; height: 380px; }
        .game-section-title { font-size: 24px; border-bottom: 1px solid #334155; padding-bottom: 12px; margin-top: 40px; margin-bottom: 20px; color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Back to System Dashboard</a>
        
        <!-- Section 1: Cumulative Totals -->
        <div class="card">
            <h2>Overall Cumulative Platform Progression</h2>
            <p>Tracking the continuous running growth curve of total collective gameplay hours across users.</p>
            <div class="chart-wrapper">
                <canvas id="cumulativeUserChart"></canvas>
            </div>
        </div>

        <!-- Section 2: Game Breakdown Header -->
        <h1 class="game-section-title">Itemized Game Analytics</h1>
        
        <!-- Container for dynamically rendered line charts -->
        <div id="gamesChartsContainer" class="grid-split"></div>
    </div>

    <script>
        // 1. Ingest Data Payloads Safely
        const datesTimeline = JSON.parse('{{ chart_dates | safe }}');
        const userDatasets = JSON.parse('{{ chart_datasets | safe }}');
        const gamesChartData = JSON.parse('{{ games_chart_data | safe }}');

        // 2. Render Global Chart (Cumulative Totals)
        new Chart(document.getElementById('cumulativeUserChart').getContext('2d'), {
            type: 'line',
            data: { labels: datesTimeline, datasets: userDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#cbd5e1' } },
                    tooltip: { callbacks: { label: (ctx) => ` ${ctx.dataset.label}: ${ctx.raw} cumulative hours` } }
                },
                scales: {
                    x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    y: { 
                        grid: { color: '#334155' }, 
                        ticks: { color: '#94a3b8' },
                        title: { display: true, text: 'Total Hours Accrued', color: '#94a3b8' }
                    }
                }
            }
        });

        // 3. Dynamically Loop & Generate Individual Game Line Graphs
        const chartsContainer = document.getElementById('gamesChartsContainer');

        gamesChartData.forEach((gameObj, index) => {
            // Build card container structure
            const card = document.createElement('div');
            card.className = 'card';

            const title = document.createElement('h2');
            title.textContent = `🎮 ${gameObj.game_name}`;
            card.appendChild(title);

            const subtitle = document.createElement('p');
            subtitle.textContent = `Daily tracking analytics monitoring isolated session hours per active user.`;
            card.appendChild(subtitle);

            const wrapper = document.createElement('div');
            wrapper.className = 'chart-wrapper';

            const canvas = document.createElement('canvas');
            canvas.id = `gameChart-${index}`;
            wrapper.appendChild(canvas);
            card.appendChild(wrapper);
            chartsContainer.appendChild(card);

            // Instantiate Chart JS itemized line graph
            new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: datesTimeline,
                    datasets: gameObj.datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } },
                        tooltip: { callbacks: { label: (ctx) => ` ${ctx.dataset.label}: ${ctx.raw} hours logged` } }
                    },
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        y: { 
                            grid: { color: '#334155' }, 
                            ticks: { color: '#94a3b8' },
                            title: { display: true, text: 'Hours Logged This Day', color: '#94a3b8' },
                            suggestedMin: 0
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
